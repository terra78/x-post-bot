name: Post to X

on:
  workflow_dispatch:
    inputs:
      account_slug:
        description: "Target account slug (optional)"
        required: false
        type: string

jobs:
  run-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run post job
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ACCOUNT_SLUG: ${{ inputs.account_slug }}
        run: npm run post
